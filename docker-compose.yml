services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fg_backend
    environment:
      PORT: 4000
      DATABASE_URL: file:/data/dev.db
      JWT_SECRET: enterprise-secret-key
      AI_PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL: llama3.2:3b
    volumes:
      - sqlite_data:/data
    ports:
      - '4000:4000'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fg_frontend
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - '3000:3000'

  ollama:
    image: ollama/ollama:latest
    container_name: fg_ollama
    profiles: ['optional']
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - '11434:11434'

volumes:
  sqlite_data:
  ollama_data:
